        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Недостатньо прав для видалення цього відгуку
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                example-1:
                  value:
                    error: "Ви можете видаляти тільки власні відгуки"
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

