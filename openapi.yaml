components:
  parameters:
    pageParam:
      name: page
      in: query
      description: Номер сторінки (починаючи з 1)
      schema:
        type: integer
        minimum: 1
        default: 1
      example: 1
    
    pageSizeParam:
      name: page_size
      in: query
      description: Кількість записів на сторінці
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      example: 20
    
    idParam:
      name: id
      in: path
      description: UUID ідентифікатор
      required: true
      schema:
        type: string
        format: uuid
      example: "c4f2d26e-9b1b-4a21-9c8a-1a6d3c251234"

  schemas:
    # ==========================================================================
    # PlaceType
    # ==========================================================================
    PlaceType:
      type: object
      properties:
        code:
          type: string
          description: Машинозчитуваний код типу
          example: "RESTAURANT"
        label:
          type: string
          description: Відображувана назва українською
          example: "Ресторан"
      required:
        - code
        - label
    
    PaginatedPlaceTypeList:
      type: object
      properties:
        count:
          type: integer
          example: 4
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/PlaceType'

    # ==========================================================================
    # Place
    # ==========================================================================
    Place:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Унікальний ідентифікатор закладу
          example: "c4f2d26e-9b1b-4a21-9c8a-1a6d3c251234"
        name:
          type: string
          description: Назва закладу
          example: "Пузата Хата"
        address:
          type: string
          description: Адреса закладу
          example: "Хрещатик, 25"
        location_lat:
          type: number
          description: Географічна широта
          example: 50.450001
        location_lng:
          type: number
          description: Географічна довгота
          example: 30.523333
        country:
          type: string
          description: Країна
          example: "Україна"
        city:
          type: string
          description: Місто
          example: "Київ"
        type:
          type: string
          description: Код типу закладу
          example: "RESTAURANT"
        type_label:
          type: string
          description: Назва типу закладу
          example: "Ресторан"
        created_at:
          type: string
          format: date-time
          description: Дата створення
          example: "2025-03-12T10:15:00Z"
        updated_at:
          type: string
          format: date-time
          description: Дата оновлення
          example: "2025-03-12T10:15:00Z"
      required:
        - id
        - name
        - address
        - location_lat
        - location_lng
        - country
        - city
        - created_at
        - updated_at
    
    PlaceCreate:
      type: object
      properties:
        name:
          type: string
          description: Назва закладу
          example: "Пузата Хата"
        address:
          type: string
          description: Адреса закладу
          example: "Хрещатик, 25"
        location_lat:
          type: number
          description: Географічна широта (-90 до 90)
          example: 50.450001
        location_lng:
          type: number
          description: Географічна довгота (-180 до 180)
          example: 30.523333
        country:
          type: string
          description: Країна
          example: "Україна"
        city:
          type: string
          description: Місто
          example: "Київ"
        type:
          type: string
          description: Код типу закладу
          example: "RESTAURANT"
      required:
        - name
        - address
        - location_lat
        - location_lng
        - country
        - city
    
    PlaceUpdate:
      type: object
      properties:
        name:
          type: string
          description: Назва закладу
          example: "Пузата Хата (оновлено)"
        address:
          type: string
          description: Адреса закладу
          example: "Хрещатик, 25А"
        location_lat:
          type: number
          description: Географічна широта
          example: 50.450001
        location_lng:
          type: number
          description: Географічна довгота
          example: 30.523333
        country:
          type: string
          description: Країна
          example: "Україна"
        city:
          type: string
          description: Місто
          example: "Київ"
        type:
          type: string
          description: Код типу закладу
          example: "RESTAURANT"
    
    PaginatedPlaceList:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/Place'

    # ==========================================================================
    # Borsch
    # ==========================================================================
    Borsch:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Унікальний ідентифікатор борщу
          example: "b1a2c3d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d"
        place:
          type: string
          format: uuid
          description: UUID закладу
          example: "c4f2d26e-9b1b-4a21-9c8a-1a6d3c251234"
        place_name:
          type: string
          description: Назва закладу
          example: "Пузата Хата"
        name:
          type: string
          description: Назва борщу
          example: "Борщ з пампушками"
        type_meat:
          type: string
          description: Тип м'яса
          enum: [no_meat, chicken, pork, beef, other]
          example: "pork"
        price_uah:
          type: number
          description: Ціна у гривнях
          example: 350.00
        weight_grams:
          type: integer
          description: Вага у грамах
          example: 600
        photo_urls:
          type: array
          items:
            type: string
          description: Список URL фотографій
          example: ["/media/borsches/b1a2c3d4/photos/abc123.png"]
        rating_salt:
          type: number
          description: Середня оцінка солоності (0-10)
          example: 5.0
        rating_meat:
          type: number
          description: Середня оцінка м'яса (0-10)
          example: 8.0
        rating_beet:
          type: number
          description: Середня оцінка буряка (0-10)
          example: 5.0
        rating_density:
          type: number
          description: Середня оцінка густоти (0-10)
          example: 10.0
        rating_aftertaste:
          type: number
          description: Середня оцінка післясмаку (0-10)
          example: 8.0
        rating_serving:
          type: number
          description: Середня оцінка подачі (0-10)
          example: 9.0
        overall_rating:
          type: number
          description: Загальна оцінка (0-10)
          example: 9.0
        created_at:
          type: string
          format: date-time
          description: Дата створення
          example: "2025-03-12T10:15:00Z"
        updated_at:
          type: string
          format: date-time
          description: Дата оновлення
          example: "2025-03-20T08:00:00Z"
      required:
        - id
        - place
        - name
        - type_meat
        - price_uah
        - weight_grams
        - created_at
        - updated_at
    
    BorschCreate:
      type: object
      properties:
        place:
          type: string
          format: uuid
          description: UUID закладу
          example: "c4f2d26e-9b1b-4a21-9c8a-1a6d3c251234"
        name:
          type: string
          description: Назва борщу
          example: "Борщ з пампушками"
        type_meat:
          type: string
          description: Тип м'яса
          enum: [no_meat, chicken, pork, beef, other]
          example: "pork"
        price_uah:
          type: number
          description: Ціна у гривнях
          minimum: 0.01
          example: 350.00
        weight_grams:
          type: integer
          description: Вага у грамах
          minimum: 1
          example: 600
        photo_urls:
          type: array
