openapi: 3.1.0
info:
  title: Naverny Borschu API
  description: |
    API для системи управління борщами та закладами.
    
    ## Основні можливості:
    - Управління закладами (Places)
    - Управління борщами (Borsches)
    - Відгуки та оцінки (Reviews)
    - Профілі користувачів (User Profiles)
    - Обрані борщі (Favorites)
    
    ## Авторизація
    Більшість ендпоінтів для створення/оновлення/видалення вимагають авторизації.
    Публічні ендпоінти (GET) доступні без авторизації.
  version: 1.0.0
  contact:
    name: Naverny Borschu Team

servers:
  - url: http://localhost:8000/api
    description: Локальний сервер розробки
  - url: https://api.naverny-borschu.com/api
    description: Production сервер

tags:
  - name: Places
    description: Заклади харчування (ресторани, кафе тощо)
  - name: Borsches
    description: Борщі (страви у закладах)
  - name: Reviews
    description: Відгуки та оцінки борщів
  - name: Profile
    description: Профілі користувачів
  - name: Favorites
    description: Обрані борщі користувачів
  - name: Place Types
    description: Довідник типів закладів
  - name: Users
    description: Користувачі системи

paths:
  /place-types/:
    get:
      tags:
        - Place Types
      summary: Отримати список типів закладів
      description: Повертає довідник типів закладів (Ресторан, Кафе, Бістро, Паб)
      operationId: listPlaceTypes
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/pageSizeParam'
      responses:
        '200':
          description: Успішний відповідь
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPlaceTypeList'
              examples:
                example-1:
                  summary: Приклад відповіді
                  value:
                    count: 4
                    next: null
                    previous: null
                    page: 1
                    page_size: 20
                    total_pages: 1
                    results:
                      - code: RESTAURANT
                        label: Ресторан
                      - code: CAFE
                        label: Кафе
                      - code: BISTRO
                        label: Бістро
                      - code: PUB
                        label: Паб
        '500':
          $ref: '#/components/responses/ServerError'

  /places/:
    get:
      tags:
        - Places
      summary: Отримати список закладів
      description: |
        Повертає список всіх закладів з можливістю фільтрації.
        
        **Фільтри:**
        - `search` - пошук по назві або адресі
        - `city` - фільтр по місту
        - `type` - фільтр по типу закладу (код типу)
      operationId: listPlaces
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/pageSizeParam'
        - name: search
          in: query
          description: Пошук по назві або адресі закладу
          schema:
            type: string
            maxLength: 255
          example: "Пузата Хата"
        - name: city
          in: query
          description: Фільтр по місту
          schema:
            type: string
          example: "Київ"
        - name: type
          in: query
          description: Фільтр по типу закладу (код типу)
          schema:
            type: string
          example: "RESTAURANT"
      responses:
        '200':
          description: Успішний відповідь
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPlaceList'
              examples:
                example-1:
                  summary: Приклад відповіді
                  value:
                    count: 2
                    next: null
                    previous: null
                    page: 1
                    page_size: 20
                    total_pages: 1
                    results:
                      - id: "c4f2d26e-9b1b-4a21-9c8a-1a6d3c251234"
                        name: "Пузата Хата"
                        address: "Хрещатик, 25"
                        location_lat: 50.450001
                        location_lng: 30.523333
                        country: "Україна"
                        city: "Київ"
                        type: "RESTAURANT"
                        type_label: "Ресторан"
                        created_at: "2025-03-12T10:15:00Z"
                        updated_at: "2025-03-12T10:15:00Z"
        '500':
          $ref: '#/components/responses/ServerError'
    
    post:
      tags:
        - Places
      summary: Створити новий заклад
      description: |
        Створює новий заклад. **Вимагає авторизації.**
        
        Усі поля обов'язкові для заповнення.
      operationId: createPlace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceCreate'
            examples:
              example-1:
                summary: Приклад створення закладу
                value:
                  name: "Пузата Хата"
                  address: "Хрещатик, 25"
                  location_lat: 50.450001
                  location_lng: 30.523333
                  country: "Україна"
                  city: "Київ"
                  type: "RESTAURANT"
      responses:
        '201':
          description: Заклад успішно створено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Place'
              examples:
                example-1:
                  summary: Приклад відповіді
                  value:
                    id: "c4f2d26e-9b1b-4a21-9c8a-1a6d3c251234"
                    name: "Пузата Хата"
                    address: "Хрещатик, 25"
                    location_lat: 50.450001
                    location_lng: 30.523333
                    country: "Україна"
                    city: "Київ"
                    type: "RESTAURANT"
                    type_label: "Ресторан"
                    created_at: "2025-03-12T10:15:00Z"
                    updated_at: "2025-03-12T10:15:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /places/{id}/:
    get:
      tags:
        - Places
      summary: Отримати заклад по ID
      description: Повертає детальну інформацію про заклад
      operationId: retrievePlace
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: Успішний відповідь
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Place'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    
    patch:
      tags:
        - Places
      summary: Оновити заклад
      description: |
        Часткове оновлення закладу. **Вимагає авторизації.**
        
        Всі поля необов'язкові (часткове оновлення).
      operationId: updatePlace
      parameters:
        - $ref: '#/components/parameters/idParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceUpdate'
            examples:
              example-1:
                summary: Приклад оновлення
                value:
                  name: "Пузата Хата (оновлено)"
                  address: "Хрещатик, 25А"
      responses:
        '200':
          description: Заклад успішно оновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Place'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    
    delete:
      tags:
        - Places
      summary: Видалити заклад
      description: |
        Видаляє заклад. **Вимагає авторизації.**
        
        Разом із закладом видаляються всі пов'язані борщі.
      operationId: deletePlace
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '204':
          description: Заклад успішно видалено
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /borsches/:
    get:
      tags:
        - Borsches
      summary: Отримати список борщів
      description: |
        Повертає список всіх борщів з можливістю фільтрації.
        
        **Фільтри:**
        - `place_id` - фільтр по закладу
        - `type_meat` - фільтр по типу м'яса
        - `min_price`, `max_price` - діапазон цін
      operationId: listBorsches
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/pageSizeParam'
        - name: place_id
          in: query
          description: Фільтр по закладу (UUID)
          schema:
            type: string
            format: uuid
          example: "c4f2d26e-9b1b-4a21-9c8a-1a6d3c251234"
        - name: type_meat
          in: query
          description: Фільтр по типу м'яса
          schema:
            type: string
            enum: [no_meat, chicken, pork, beef, other]
          example: "pork"
        - name: min_price
          in: query
          description: Мінімальна ціна (грн)
          schema:
            type: number
            minimum: 0
          example: 200
        - name: max_price
          in: query
          description: Максимальна ціна (грн)
          schema:
            type: number
            minimum: 0
          example: 500
      responses:
        '200':
          description: Успішний відповідь
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBorschList'
              examples:
                example-1:
                  summary: Приклад відповіді
                  value:
                    count: 2
                    next: null
                    previous: null
                    page: 1
                    page_size: 20
                    total_pages: 1
                    results:
                      - id: "b1a2c3d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d"
                        place: "c4f2d26e-9b1b-4a21-9c8a-1a6d3c251234"
                        place_name: "Пузата Хата"
                        name: "Борщ з пампушками"
                        type_meat: "pork"
                        price_uah: 350.00
                        weight_grams: 600
                        photo_urls:
                          - "/media/borsches/b1a2c3d4/photos/abc123.png"
                        rating_salt: 5.0
                        rating_meat: 8.0
                        rating_beet: 5.0
                        rating_density: 10.0
                        rating_aftertaste: 8.0
                        rating_serving: 9.0
                        overall_rating: 9.0
                        created_at: "2025-03-12T10:15:00Z"
                        updated_at: "2025-03-20T08:00:00Z"
        '500':
          $ref: '#/components/responses/ServerError'
    
    post:
      tags:
        - Borsches
      summary: Створити новий борщ
      description: |
        Створює новий борщ для закладу. **Вимагає авторизації.**
        
        Обов'язкові поля: `place`, `name`, `type_meat`, `price_uah`, `weight_grams`.
        
        Рейтинги ініціалізуються нулями.
      operationId: createBorsch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BorschCreate'
            examples:
              example-1:
                summary: Приклад створення борщу
                value:
                  place: "c4f2d26e-9b1b-4a21-9c8a-1a6d3c251234"
                  name: "Борщ з пампушками"
                  type_meat: "pork"
                  price_uah: 350.00
                  weight_grams: 600
                  photo_urls: []
      responses:
        '201':
          description: Борщ успішно створено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Borsch'
              examples:
                example-1:
                  summary: Приклад відповіді
                  value:
                    id: "b1a2c3d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d"
                    place: "c4f2d26e-9b1b-4a21-9c8a-1a6d3c251234"
                    place_name: "Пузата Хата"
                    name: "Борщ з пампушками"
                    type_meat: "pork"
                    price_uah: 350.00
                    weight_grams: 600
                    photo_urls: []
                    rating_salt: 0.0
                    rating_meat: 0.0
                    rating_beet: 0.0
                    rating_density: 0.0
                    rating_aftertaste: 0.0
                    rating_serving: 0.0
                    overall_rating: 0.0
                    created_at: "2025-03-12T10:15:00Z"
                    updated_at: "2025-03-12T10:15:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Заклад не знайдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                example-1:
                  value:
                    error: "Заклад з таким ID не знайдено"
        '500':
          $ref: '#/components/responses/ServerError'

  /borsches/{id}/:
    get:
      tags:
        - Borsches
      summary: Отримати борщ по ID
      description: Повертає детальну інформацію про борщ
      operationId: retrieveBorsch
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: Успішний відповідь
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Borsch'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    
    patch:
      tags:
        - Borsches
      summary: Оновити борщ
      description: |
        Часткове оновлення борщу. **Вимагає авторизації.**
        
        Дозволяє оновлювати основні атрибути (не рейтинги).
      operationId: updateBorsch
      parameters:
        - $ref: '#/components/parameters/idParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BorschUpdate'
            examples:
              example-1:
                summary: Приклад оновлення
                value:
                  name: "Борщ з пампушками (оновлено)"
                  price_uah: 380.00
      responses:
        '200':
          description: Борщ успішно оновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Borsch'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    
    delete:
      tags:
        - Borsches
      summary: Видалити борщ
      description: |
        Видаляє борщ. **Вимагає авторизації.**
        
        Разом із борщем видаляються всі пов'язані відгуки.
      operationId: deleteBorsch
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '204':
          description: Борщ успішно видалено
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /borsches/{id}/upload_photo/:
    post:
      tags:
        - Borsches
      summary: Завантажити фото борщу
      description: |
        Завантажує фото для борщу. **Вимагає авторизації.**
        
        Приймає `multipart/form-data` з полем `photo`.
        
        Фото зберігається у медіа-директорію, URL додається до списку `photo_urls`.
      operationId: uploadBorschPhoto
      parameters:
        - $ref: '#/components/parameters/idParam'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                photo:
                  type: string
                  format: binary
                  description: Файл зображення (PNG, JPG, WEBP)
              required:
                - photo
            examples:
              example-1:
                summary: Приклад завантаження фото
                value:
                  photo: "<binary file: borsch-photo.png>"
      responses:
        '201':
          description: Фото успішно завантажено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhotoUploadResponse'
              examples:
                example-1:
                  summary: Приклад відповіді
                  value:
                    photo_url: "/media/borsches/b1a2c3d4/photos/abc123.png"
                    message: "Фото успішно завантажено"
        '400':
          description: Файл не знайдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                example-1:
                  value:
                    error: "Файл не знайдено. Використовуйте поле \"photo\"."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /reviews/:
    get:
      tags:
        - Reviews
      summary: Отримати список відгуків
      description: |
        Повертає список відгуків з можливістю фільтрації по борщу.
        
        **Фільтри:**
        - `borsch_id` - фільтр по борщу (опційний)
      operationId: listReviews
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/pageSizeParam'
        - name: borsch_id
          in: query
          description: Фільтр по борщу (UUID)
          schema:
            type: string
            format: uuid
          example: "b1a2c3d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d"
      responses:
        '200':
          description: Успішний відповідь
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedReviewList'
              examples:
                example-1:
                  summary: Приклад відповіді
                  value:
                    count: 2
                    next: null
                    previous: null
                    page: 1
                    page_size: 20
                    total_pages: 1
                    results:
                      - id: "rev-123456-7890ab-cdef"
                        borsch: "b1a2c3d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d"
                        borsch_name: "Борщ з пампушками"
                        user: 1
                        author_username: "user123"
                        temp_user_id: ""
                        message: "Дуже смачний борщ! Рекомендую."
                        rating_salt: 9.0
                        rating_meat: 8.0
                        rating_beet: 9.0
                        rating_density: 10.0
                        rating_aftertaste: 8.0
                        rating_serving: 10.0
                        overall_rating: 9.0
                        created_at: "2025-03-12T10:00:00Z"
                        updated_at: "2025-03-12T10:00:00Z"
        '500':
          $ref: '#/components/responses/ServerError'
    
    post:
      tags:
        - Reviews
      summary: Створити новий відгук
      description: |
        Створює новий відгук для борщу. **Вимагає авторизації.**
        
        Всі оцінки обов'язкові для заповнення (діапазон 0-10).
        
        Після створення відгуку автоматично перераховуються рейтинги борщу.
      operationId: createReview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreate'
            examples:
              example-1:
                summary: Приклад створення відгуку
                value:
                  borsch: "b1a2c3d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d"
                  message: "Дуже смачний борщ! Рекомендую."
                  rating_salt: 9
                  rating_meat: 8
                  rating_beet: 9
                  rating_density: 10
                  rating_aftertaste: 8
                  rating_serving: 10
                  overall_rating: 9
      responses:
        '201':
          description: Відгук успішно створено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
              examples:
                example-1:
                  summary: Приклад відповіді
                  value:
                    id: "rev-123456-7890ab-cdef"
                    borsch: "b1a2c3d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d"
                    borsch_name: "Борщ з пампушками"
                    user: 1
                    author_username: "user123"
                    temp_user_id: ""
                    message: "Дуже смачний борщ! Рекомендую."
                    rating_salt: 9.0
                    rating_meat: 8.0
                    rating_beet: 9.0
                    rating_density: 10.0
                    rating_aftertaste: 8.0
                    rating_serving: 10.0
                    overall_rating: 9.0
                    created_at: "2025-03-12T10:00:00Z"
                    updated_at: "2025-03-12T10:00:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Борщ не знайдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                example-1:
                  value:
                    error: "Борщ з таким ID не знайдено"
        '500':
          $ref: '#/components/responses/ServerError'

  /reviews/{id}/:
    get:
      tags:
        - Reviews
      summary: Отримати відгук по ID
      description: Повертає детальну інформацію про відгук
      operationId: retrieveReview
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        '200':
          description: Успішний відповідь
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
