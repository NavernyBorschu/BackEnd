            type: string
          description: Список URL фотографій
          example: []
      required:
        - place
        - name
        - type_meat
        - price_uah
        - weight_grams
    
    BorschUpdate:
      type: object
      properties:
        name:
          type: string
          description: Назва борщу
          example: "Борщ з пампушками (оновлено)"
        type_meat:
          type: string
          description: Тип м'яса
          enum: [no_meat, chicken, pork, beef, other]
        price_uah:
          type: number
          description: Ціна у гривнях
          minimum: 0.01
          example: 380.00
        weight_grams:
          type: integer
          description: Вага у грамах
          minimum: 1
          example: 650
        photo_urls:
          type: array
          items:
            type: string
          description: Список URL фотографій
    
    PaginatedBorschList:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/Borsch'

