name: CI/CD Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-django
      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: naverny_borschu_api.settings_test
        run: pytest --tb=short

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via webhook
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://api.navernyborshchu.com/deploy-webhook \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$(echo -n '${{ toJson(github) }}' | openssl dgst -sha256 -hmac '${{ secrets.WEBHOOK_SECRET }}' | cut -d' ' -f2)" \
            -d '${{ toJson(github) }}'
      - name: Set working directory
        run: cd BackEnd/BackEnd
      - name: Collect static files
        run: |
          python manage.py collectstatic --noinput
